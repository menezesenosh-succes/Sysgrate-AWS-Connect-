<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Sysgrate</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family: 'Inter', sans-serif;
margin:0;
background:linear-gradient(135deg,#0b132b,#1c2541,#3a0ca3);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
}

.container{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:16px;
padding:60px;
text-align:center;
max-width:520px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.check{
font-size:60px;
margin-bottom:20px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
color:#d0d0d0;
line-height:1.6;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:14px 28px;
border-radius:8px;
background:#ff9900;
color:#000;
text-decoration:none;
font-weight:600;
transition:0.2s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(255,153,0,0.4);
}

</style>
</head>

<body>

<div class="container">

<div class="check">✅</div>

<h1>Thank You!</h1>

<p>
Your demo request has been received successfully.  
Our team will contact you shortly to schedule your Amazon Connect demo.
</p>

<a href="https://sysgrate-aws-connect.vercel.app/" class="btn">
Return to Website
</a>

</div>

</body>
</html>
